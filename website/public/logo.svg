<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#111127"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
    <filter id="innerGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#818cf8" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="url(#accent)" stroke-width="4"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>

  <!-- Shield shape — the "Gate" -->
  <path d="M256 80 L380 150 L380 300 Q380 380 256 430 Q132 380 132 300 L132 150 Z"
        fill="none" stroke="url(#glow)" stroke-width="6" filter="url(#shadow)"/>

  <!-- Inner shield fill -->
  <path d="M256 100 L365 162 L365 295 Q365 365 256 410 Q147 365 147 295 L147 162 Z"
        fill="url(#bg)" opacity="0.8"/>

  <!-- Checkmark — the "Test" -->
  <path d="M200 260 L240 300 L320 200"
        fill="none" stroke="url(#accent)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#innerGlow)"/>

  <!-- Scan lines across shield -->
  <line x1="170" y1="210" x2="342" y2="210" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
  <line x1="165" y1="240" x2="347" y2="240" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
  <line x1="160" y1="270" x2="352" y2="270" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <line x1="155" y1="300" x2="357" y2="300" stroke="#6366f1" stroke-width="1" opacity="0.1"/>
  <line x1="160" y1="330" x2="352" y2="330" stroke="#6366f1" stroke-width="1" opacity="0.08"/>

  <!-- Circuit dots at shield corners -->
  <circle cx="256" cy="95" r="5" fill="#818cf8"/>
  <circle cx="370" cy="158" r="4" fill="#818cf8" opacity="0.7"/>
  <circle cx="142" cy="158" r="4" fill="#818cf8" opacity="0.7"/>
  <circle cx="256" cy="415" r="5" fill="#818cf8"/>

  <!-- "GT" text -->
  <text x="256" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="36" font-weight="800" letter-spacing="8">
    <tspan fill="#e2e8f0">GATE</tspan><tspan fill="url(#accent)">TEST</tspan>
  </text>
</svg>
