name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build website
        run: cd website && npm ci && npm run build

  gatetest:
    name: GateTest Quality Gate (self-dogfood)
    runs-on: ubuntu-latest
    needs: test  # only run if native tests pass
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run GateTest on itself (self-dogfood)
        run: node bin/gatetest.js --suite full
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    # GateTest is advisory for now — reports findings but does not block merge.
    # Flip continue-on-error to false once GateTest is correctly configured and stable.
    continue-on-error: true
