# ============================================================================
# GATETEST QUALITY GATE — PROTECTED INTEGRATION FILE
# ============================================================================
# This workflow is a permanent integration between GateTest and a protected
# platform (Crontech / Gluecron). It MUST NOT be removed, weakened, or
# disabled without explicit authorization from Craig.
#
# See the GateTest Bible (CLAUDE.md) → "PROTECTED PLATFORMS" section.
# Install location in target repo: .github/workflows/gatetest-gate.yml
# Source of truth: https://github.com/ccantynz-alt/gatetest
#                  /integrations/github-actions/gatetest-gate.yml
# ============================================================================

name: GateTest Quality Gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write
  security-events: write
  checks: write

concurrency:
  group: gatetest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gatetest:
    name: GateTest — Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clone GateTest (single source of truth)
        env:
          # Optional: set GATETEST_TOKEN in repo secrets if this repo is private
          GATETEST_TOKEN: ${{ secrets.GATETEST_TOKEN }}
        run: |
          if [ -n "$GATETEST_TOKEN" ]; then
            git clone --depth 1 "https://x-access-token:${GATETEST_TOKEN}@github.com/ccantynz-alt/gatetest.git" "$RUNNER_TEMP/gatetest"
          else
            git clone --depth 1 "https://github.com/ccantynz-alt/gatetest.git" "$RUNNER_TEMP/gatetest"
          fi
          echo "GATETEST_HOME=$RUNNER_TEMP/gatetest" >> $GITHUB_ENV
          echo "$RUNNER_TEMP/gatetest/bin" >> $GITHUB_PATH
          chmod +x "$RUNNER_TEMP/gatetest/bin/gatetest.js"

      - name: Install GateTest dependencies
        run: |
          cd "$RUNNER_TEMP/gatetest"
          npm ci --omit=dev --ignore-scripts 2>/dev/null || npm install --production --ignore-scripts 2>/dev/null || true

      - name: Verify GateTest installed
        run: node "$GATETEST_HOME/bin/gatetest.js" --version

      - name: GateTest — Quick (diff-mode) on PRs
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node "$GATETEST_HOME/bin/gatetest.js" --suite quick --diff --sarif --junit --project "$GITHUB_WORKSPACE"

      - name: GateTest — Full on main push
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node "$GATETEST_HOME/bin/gatetest.js" --suite full --sarif --junit --project "$GITHUB_WORKSPACE"

      - name: Upload SARIF to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .gatetest/reports/gatetest-results.sarif
          category: gatetest

      - name: Upload GateTest reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatetest-reports-${{ github.run_id }}
          path: |
            .gatetest/reports/
          retention-days: 30
          if-no-files-found: ignore

      # ----------------------------------------------------------------
      # GATETEST AUTO-REPAIR — opt-in self-healing for the gate.
      #
      # WHY: the gate without repair just blocks PRs. The novice ("Charlie
      # Brown") then has to translate every finding into a code change by
      # hand. Auto-repair lets the gate ALSO fix what it found and open a
      # follow-up PR — same model as Dependabot, only smarter.
      #
      # OPT IN per repo by adding two things in repo settings:
      #   1. Variable: GATETEST_AUTOFIX = "on"   (Settings → Secrets and
      #      variables → Actions → Variables tab)
      #   2. Secret: ANTHROPIC_API_KEY          (Settings → Secrets and
      #      variables → Actions → Secrets tab)
      #
      # OFF by default. Repos without both vars behave EXACTLY as before:
      # gate runs, blocks failing PRs, never touches the codebase.
      #
      # When ON: after the gate fails, the workflow runs `gatetest --fix`
      # against the workspace (which generates fixes locally with Claude),
      # then peter-evans/create-pull-request opens a PR with the diff.
      # The original failing PR is unchanged — the customer reviews + merges
      # the auto-repair PR separately. Auto-repair failure NEVER masks the
      # gate result; the gate still fails and blocks merge of the dirty PR.
      # ----------------------------------------------------------------
      - name: Detect ANTHROPIC_API_KEY (for auto-repair gating)
        if: always()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Set without echoing — we never want the secret in logs. The
          # length check is enough to gate on presence.
          if [ -n "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_KEY_PRESENT=yes" >> "$GITHUB_ENV"
          else
            echo "ANTHROPIC_KEY_PRESENT=no" >> "$GITHUB_ENV"
          fi

      - name: GateTest — Auto-repair (opt-in)
        if: failure() && vars.GATETEST_AUTOFIX == 'on' && env.ANTHROPIC_KEY_PRESENT == 'yes'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # `gatetest --fix` modifies files in-tree. The next step
          # detects the diff and opens a PR. Failure here is logged
          # but never blocks the workflow — the gate verdict stands.
          node "$GATETEST_HOME/bin/gatetest.js" --suite quick --fix --project "$GITHUB_WORKSPACE" \
            || echo "Auto-repair could not fix every issue — opening PR with what was fixed"

      - name: Open auto-repair pull request
        if: failure() && vars.GATETEST_AUTOFIX == 'on' && env.ANTHROPIC_KEY_PRESENT == 'yes'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gatetest/auto-repair-${{ github.run_id }}
          base: ${{ github.head_ref || github.ref_name }}
          commit-message: "GateTest auto-repair: fix findings from run ${{ github.run_id }}"
          title: "GateTest auto-repair — fixes from run ${{ github.run_id }}"
          body: |
            This PR was opened automatically by the GateTest quality gate
            after the original PR / push triggered failing checks. The fixes
            were generated by Claude and re-validated against the scanner
            before commit.

            **Original run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Review the diff, run your own tests, and merge if the changes
            look right. The original PR is unchanged.

            ---
            _Generated by GateTest — gatetest.ai_
          delete-branch: true
          add-paths: |
            **/*.js
            **/*.jsx
            **/*.mjs
            **/*.cjs
            **/*.ts
            **/*.tsx
            **/*.mts
            **/*.cts
            **/*.json
            **/*.yml
            **/*.yaml
            **/*.md
